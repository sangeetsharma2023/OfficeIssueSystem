{% extends "issues/base.html" %}
{% block content %}

<h4>Send File: {{ file }}</h4>

<form method="post" class="card p-4 bg-white">
{% csrf_token %}

<label>Send To</label>
<input name="to_location" class="form-control mb-3">

<label>Remark</label>
<textarea name="remark" class="form-control mb-3"></textarea>

<button class="btn btn-primary">Send</button>

</form>

{% endblock %}
