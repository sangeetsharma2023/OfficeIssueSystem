{% extends "issues/base.html" %}
{% block content %}

<h4><i class="bi bi-plus-square"></i> Add Event — {{ issue.title }}</h4>
<hr>

<form method="post" class="card p-4 shadow-sm bg-white">
{% csrf_token %}

<div class="row mb-3">
    <div class="col">
        <label>Date</label>
        <input type="date" name="event_date" class="form-control">
    </div>

    <div class="col">
        <label>Type</label>
        <select name="event_type" class="form-control">
            <option value="note">Note</option>
            <option value="received">Letter Received</option>
            <option value="sent">Letter Issued</option>
            <option value="discussion">Discussion</option>
            <option value="meeting">Meeting</option>
            <option value="update">Update</option>
        </select>
    </div>
</div>

<label>Short Note</label>
<input type="text" name="short_note" class="form-control mb-3">

<label>Detailed Note</label>
<textarea name="detailed_note" rows="4" class="form-control mb-3"></textarea>

<label>File</label>
<select name="file" class="form-control mb-3">
    <option value="">-- Select File --</option>

    {% for f in files %}
        <option value="{{ f.id }}">
            {{ f.file_no }} - {{ f.name }}
        </option>
    {% endfor %}
</select>

<label>Letter No</label>
<input type="text" name="letter_no" class="form-control mb-3">

<label>Sender</label>
<input type="text" name="sender" class="form-control mb-3">

<label>Sender Address</label>
<textarea name="sender_address" class="form-control mb-3"></textarea>

<label>References (N/21, C/45, Pg/31)</label>
<input type="text" name="references" class="form-control mb-3">

<button class="btn btn-success">
    <i class="bi bi-save"></i> Save Event
</button>

</form>

{% endblock %}
