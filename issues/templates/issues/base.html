<!DOCTYPE html>
<html>
<head>
    <title>Issue Tracker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { background:#f4f6f9; }
        .timeline-card {
            border-left:5px solid #0d6efd;
            background:white;
            padding:15px;
            margin-bottom:15px;
            border-radius:10px;
            box-shadow:0 2px 6px rgba(0,0,0,0.1);
        }
        .ref-badge{
            background:#e9ecef;
            padding:3px 8px;
            margin:2px;
            border-radius:6px;
            display:inline-block;
            font-size:13px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">

    <!-- Left side -->
    <div class="d-flex align-items-center">

        <a href="{% url 'issue_list' %}" class="navbar-brand mb-0 h1 text-decoration-none">
            <i class="bi bi-folder2-open"></i> Issue Timeline System
        </a>
        <a class="btn btn-light btn-sm me-2" href="{% url 'file_list' %}">
            <i class="bi bi-folder"></i> Files
        </a>

        

    </div>

    <!-- Right side -->
    <div>
        <a class="btn btn-light btn-sm me-2" href="{% url 'global_search' %}">
            <i class="bi bi-search"></i> Search
        </a>

        <a class="btn btn-light btn-sm" href="{% url 'logout' %}">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </div>

  </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
